<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ひらがななぞり教材（iPad授業専用）</title>
<style>
body{
  font-family:sans-serif;
  margin:0;
  text-align:center;
  touch-action:none;
  -webkit-user-select:none;
  user-select:none;
  -webkit-touch-callout:none;
  overflow:hidden;
  height:100vh;
}

h2{margin:10px 0;}

.toolbar{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:6px;
}

button{
  font-size:18px;
  padding:10px 14px;
}

button.active{background:#ddd;}

.container{
  display:flex;
  justify-content:space-around;
  align-items:flex-start;
  padding:10px;
  width:100vw;
  box-sizing:border-box;
}

.word{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.image{
  font-size:6vw;
  height:7vw;
}

.gridWrap{
  position:relative;
}

.grid{
  position:absolute;
  top:0;
  left:0;
}

.cell{
  width:10vw;
  height:10vw;
  border:1px solid #ccc;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:5vw;
  color:#bbb;
}

canvas{
  position:absolute;
  top:0;
  left:0;
  touch-action:none;
}
</style>
</head>
<body>

<h2>ひらがなをなぞろう</h2>

<div class="toolbar">
  <button onclick="startLesson()">できました</button>
  <button onclick="toggleEraser()">けしゴム</button>
  <button id="stampBtn" onclick="toggleStamp()" disabled>🌸花丸</button>
  <button id="reloadBtn" onclick="reloadLesson()" disabled>リロード</button>
</div>

<div class="container" id="container"></div>

<script>

const words=[
  {text:"いぬ",emoji:"🐶"},{text:"ねこ",emoji:"🐱"},{text:"さかな",emoji:"🐟"},{text:"とり",emoji:"🐦"},{text:"くるま",emoji:"🚗"},
  {text:"でんしゃ",emoji:"🚃"},{text:"りんご",emoji:"🍎"},{text:"みかん",emoji:"🍊"},{text:"ばなな",emoji:"🍌"},{text:"すいか",emoji:"🍉"},
  {text:"ぶどう",emoji:"🍇"},{text:"もも",emoji:"🍑"},{text:"めろん",emoji:"🍈"},{text:"いちご",emoji:"🍓"},{text:"きりん",emoji:"🦒"},
  {text:"ぞう",emoji:"🐘"},{text:"らいおん",emoji:"🦁"},{text:"うさぎ",emoji:"🐰"},{text:"きつね",emoji:"🦊"},{text:"たぬき",emoji:"🦝"},
  {text:"みず",emoji:"💧"},{text:"やま",emoji:"⛰️"},{text:"かわ",emoji:"🏞️"},{text:"そら",emoji:"☁️"},{text:"たいよう",emoji:"☀️"},
  {text:"つき",emoji:"🌙"},{text:"ほし",emoji:"⭐"},{text:"はな",emoji:"🌸"},{text:"くさ",emoji:"🌿"},{text:"あめ",emoji:"☔"},
  {text:"ゆき",emoji:"❄️"},{text:"がっこう",emoji:"🏫"},{text:"せんせい",emoji:"👩‍🏫"},{text:"ともだち",emoji:"👫"},{text:"あさ",emoji:"🌅"},
  {text:"ひる",emoji:"🌞"},{text:"よる",emoji:"🌃"},{text:"いけ",emoji:"🪷"},{text:"どうぶつ",emoji:"🐾"},{text:"くも",emoji:"☁️"}
];

let finished=false;
let tool="pen";

function getWords(n){
  return [...words].sort(()=>Math.random()-0.5).slice(0,n);
}

function toggleEraser(){
  if(finished) return;
  tool = tool==="eraser" ? "pen" : "eraser";
}

function toggleStamp(){
  if(!finished) return;
  tool = tool==="stamp" ? "pen" : "stamp";
  document.getElementById("stampBtn").classList.toggle("active");
}

function createGrid(text){
  const wrap=document.createElement("div");
  wrap.className="gridWrap";

  const size=window.innerWidth*0.1;
  const h=size*text.length;
  const pad=60;

  wrap.style.width=(size+pad*2)+"px";
  wrap.style.height=(h+pad*2)+"px";

  const grid=document.createElement("div");
  grid.className="grid";
  grid.style.left=pad+"px";
  grid.style.top=pad+"px";

  text.split("").forEach(c=>{
    const cell=document.createElement("div");
    cell.className="cell";
    cell.textContent=c;
    grid.appendChild(cell);
  });

  const student=document.createElement("canvas");
  const teacher=document.createElement("canvas");

  student.width=size+pad*2;
  student.height=h+pad*2;
  teacher.width=size+pad*2;
  teacher.height=h+pad*2;

  const sctx=student.getContext("2d");
  const tctx=teacher.getContext("2d");

  sctx.lineWidth=6;
  sctx.lineCap="round";
  sctx.strokeStyle="black";

  tctx.lineWidth=8;
  tctx.lineCap="round";
  tctx.strokeStyle="red";

  student.style.position="absolute";
  teacher.style.position="absolute";
  student.style.top="0";
  teacher.style.top="0";
  student.style.left="0";
  teacher.style.left="0";

  student.style.zIndex=1;
  teacher.style.zIndex=2;

  teacher.style.pointerEvents="none";

  let drawing=false;

  function pos(e,c){
    const r=c.getBoundingClientRect();
    return {x:e.clientX-r.left,y:e.clientY-r.top};
  }

  student.addEventListener("pointerdown",e=>{
    if(finished) return;
    drawing=true;
    const p=pos(e,student);
    sctx.beginPath();
    sctx.moveTo(p.x,p.y);
  });

  student.addEventListener("pointermove",e=>{
    if(!drawing||finished) return;
    const p=pos(e,student);

    if(tool==="eraser"){
      sctx.globalCompositeOperation="destination-out";
      sctx.lineWidth=25;
    }else{
      sctx.globalCompositeOperation="source-over";
      sctx.lineWidth=6;
    }

    sctx.lineTo(p.x,p.y);
    sctx.stroke();
  });

  student.addEventListener("pointerup",()=>{
    drawing=false;
    sctx.globalCompositeOperation="source-over";
  });

  teacher.addEventListener("pointerdown",e=>{
    if(!finished) return;

    const p=pos(e,teacher);

    if(tool==="stamp"){
      tctx.font="90px serif";
      tctx.fillText("🌸",p.x-40,p.y+30);
      return;
    }

    drawing=true;
    tctx.beginPath();
    tctx.moveTo(p.x,p.y);
  });

  teacher.addEventListener("pointermove",e=>{
    if(!drawing||tool==="stamp"||!finished) return;
    const p=pos(e,teacher);
    tctx.lineTo(p.x,p.y);
    tctx.stroke();
  });

  teacher.addEventListener("pointerup",()=>drawing=false);

  wrap.appendChild(grid);
  wrap.appendChild(student);
  wrap.appendChild(teacher);

  return wrap;
}

function render(){
  const c=document.getElementById("container");
  c.innerHTML="";
  getWords(5).forEach(w=>{
    const d=document.createElement("div");
    d.className="word";

    const img=document.createElement("div");
    img.className="image";
    img.textContent=w.emoji;

    d.appendChild(img);
    d.appendChild(createGrid(w.text));
    c.appendChild(d);
  });
}

function startLesson(){
  finished=true;
  document.getElementById("stampBtn").disabled=false;
  document.getElementById("reloadBtn").disabled=false;
  document.querySelectorAll("canvas").forEach(c=>c.style.pointerEvents="auto");
}

function reloadLesson(){
  finished=false;
  tool="pen";
  document.getElementById("stampBtn").disabled=true;
  document.getElementById("reloadBtn").disabled=true;
  document.getElementById("stampBtn").classList.remove("active");
  render();
}

render();

window.addEventListener("gesturestart",e=>e.preventDefault());
document.addEventListener("touchmove",e=>{if(!finished)e.preventDefault();},{passive:false});

</script>

</body>
</html>
